name: Build and Test

on:
    pull_request:
        branches: [develop]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NSIS (Windows only)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Configure CMake
        run: cmake -B build -S plugin/ -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Show artefacts folder
        if: runner.os == 'macOS'
        run: find build/src/AW-01_artefacts -type f

      - name: Show cmake_install.cmake VST3 section
        if: runner.os == 'macOS'
        run: grep -r "VST3\|AW-01.vst3\|DIRECTORY" build/src/cmake_install.cmake || echo "Nothing found"

      - name: Show full cmake_install.cmake
        if: runner.os == 'macOS'
        run: cat build/src/cmake_install.cmake

      - name: Unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Generate Package
        run: cd build && cpack -C Release

      - name: Inspect pkg contents
        if: runner.os == 'macOS'
        run: |
          pkgutil --expand build/AW-01.pkg /tmp/aw01_expanded
          find /tmp/aw01_expanded -type f

      - name: Inspect pkg Payload contents
        if: runner.os == 'macOS'
        run: |
          cd /tmp/aw01_expanded/AW-01-VST3.pkg
          lsbom Bom

      - name: Test Package
        run: |
          pip install -r ./plugin/tests/installer/requirement.txt
          pytest
